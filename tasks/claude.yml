---
# Claude Code configuration — rules, agents, skills, CLAUDE.md assembly

- name: Ensure ~/.claude directory exists
  file:
    path: "{{ target_home }}/.claude"
    state: directory
    mode: '0755'
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

- name: Symlink Claude rules directory
  file:
    src: "{{ dotfiles_dir }}/common/claude/rules"
    dest: "{{ target_home }}/.claude/rules"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

- name: Check current state of ~/.claude/agents
  stat:
    path: "{{ target_home }}/.claude/agents"
  register: claude_agents_path

- name: Remove legacy ~/.claude/agents symlink (now a real directory)
  file:
    path: "{{ target_home }}/.claude/agents"
    state: absent
  when:
    - claude_agents_path.stat.exists
    - claude_agents_path.stat.islnk | default(false)

- name: Ensure ~/.claude/agents directory exists
  file:
    path: "{{ target_home }}/.claude/agents"
    state: directory
    mode: '0755'
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

- name: Find public Claude agents
  find:
    paths: "{{ dotfiles_dir }}/common/claude/agents"
    patterns: "*.md"
    file_type: file
    recurse: no
  register: public_claude_agents

- name: Symlink public Claude agents into ~/.claude/agents
  file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/.claude/agents/{{ item.path | basename }}"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
  loop: "{{ public_claude_agents.files | default([]) }}"

- name: Copy Claude settings.json (if not already present)
  copy:
    src: "{{ dotfiles_dir }}/common/claude/settings.json"
    dest: "{{ target_home }}/.claude/settings.json"
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
    mode: '0644'
    force: no

- name: Ensure ~/.claude/skills directory exists
  file:
    path: "{{ target_home }}/.claude/skills"
    state: directory
    mode: '0755'
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

- name: Find public Claude skills
  find:
    paths: "{{ dotfiles_dir }}/common/claude/skills"
    file_type: directory
    recurse: no
  register: public_claude_skills
  ignore_errors: yes

- name: Symlink public Claude skills into ~/.claude/skills
  file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/.claude/skills/{{ item.path | basename }}"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
  loop: "{{ public_claude_skills.files | default([]) }}"
  when: public_claude_skills is succeeded

- name: Find private Claude skills
  find:
    paths: "{{ dotfiles_dir }}/private-config/claude/skills"
    file_type: directory
    recurse: no
  register: private_claude_skills
  ignore_errors: yes

- name: Symlink private Claude skills
  file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/.claude/skills/{{ item.path | basename }}"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
  loop: "{{ private_claude_skills.files | default([]) }}"
  when: private_claude_skills is succeeded

- name: Find private Claude agent supplements
  find:
    paths: "{{ dotfiles_dir }}/private-config/claude/agents"
    patterns: "*.md"
    file_type: file
    recurse: no
  register: private_claude_agents
  ignore_errors: yes

- name: Symlink private Claude agent supplements into ~/.claude/agents
  file:
    src: "{{ item.path }}"
    dest: "{{ target_home }}/.claude/agents/{{ item.path | basename }}"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
  loop: "{{ private_claude_agents.files | default([]) }}"
  when: private_claude_agents is succeeded

# ~/.claude/CLAUDE.md is a generated wrapper (home-dir only, never committed) that
# imports the public and private layers by reference. This keeps the committed public
# CLAUDE.md a clean, self-contained ruleset, while letting both layers be live symlinks
# so edits flow straight back to their repos without re-provisioning.
- name: Check if private Claude config exists
  stat:
    path: "{{ dotfiles_dir }}/private-config/claude/CLAUDE.private.md"
  register: claude_private_config

- name: Symlink public Claude rules layer
  file:
    src: "{{ dotfiles_dir }}/common/claude/CLAUDE.md"
    dest: "{{ target_home }}/.claude/CLAUDE.public.md"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

- name: Symlink private Claude rules layer
  file:
    src: "{{ dotfiles_dir }}/private-config/claude/CLAUDE.private.md"
    dest: "{{ target_home }}/.claude/CLAUDE.private.md"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
  when: claude_private_config.stat.exists

- name: Remove stale private Claude rules symlink when absent
  file:
    path: "{{ target_home }}/.claude/CLAUDE.private.md"
    state: absent
  when: not claude_private_config.stat.exists

- name: Generate ~/.claude/CLAUDE.md wrapper (imports public + optional private)
  copy:
    dest: "{{ target_home }}/.claude/CLAUDE.md"
    content: |-
      @~/.claude/CLAUDE.public.md
      {{ '@~/.claude/CLAUDE.private.md' if claude_private_config.stat.exists else '' }}
    owner: "{{ target_user }}"
    group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
    mode: '0644'
