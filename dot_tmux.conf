# start counting the tabs at 1 instead of 0
set -g base-index 1

# vim key bindings
# ctrl + b + [ to enter copy mode
# space to start selection
# enter to copy
# ctrl + b + ] to paste
setw -g mode-keys vi

# bind <ctrl> + b + R to reload the config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# enable utf-8 character support
# setw -q -g utf-8 on

#set -g default-terminal "screen-256color"

# set the status bar at the top
set -g status-position top

# Set the terminal window title so the compositor (Hyprland) and tools like the
# quickshell workspace overview show session/window/command instead of just "tmux".
set -g set-titles on
set -g set-titles-string "tmux ❯ #{b:pane_current_path}"

# TPM tmux plugin manager
# to install it:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# A set of tmux options that should be acceptable to everyone.
set -g @plugin 'tmux-plugins/tmux-sensible'

# An arctic, north-bluish clean and elegant tmux color theme.
set -g @plugin "arcticicestudio/nord-tmux"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override Nord status-right to include current pane path (last 3 segments)
set -g status-right-length 120
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black]#[fg=yellow,bg=brightblack]  #(echo '#{pane_current_path}' | rev | cut -d'/' -f1-3 | rev) #[fg=white,bg=brightblack]#[fg=white,bg=brightblack] %H:%M #[fg=cyan,bg=brightblack]#[fg=black,bg=cyan,bold] #H "

