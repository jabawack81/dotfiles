# ╔══════════════════════════════════════════════════════════════════╗
# ║  hyprlock — cyberpunk terminal                                   ║
# ║  palette: cyan #33ccff · green #00ff99 · magenta #ff2a6d         ║
# ║  font: JetBrainsMono Nerd Font                                   ║
# ║  all keys verified against hyprlock source                       ║
# ╚══════════════════════════════════════════════════════════════════╝

$font      = JetBrainsMono Nerd Font
$cyan      = rgba(51, 204, 255, 1.0)
$cyan_dim  = rgba(51, 204, 255, 0.55)
$green     = rgba(0, 255, 153, 1.0)
$magenta   = rgba(255, 42, 109, 1.0)
$white     = rgba(224, 228, 235, 0.92)
$white_dim = rgba(224, 228, 235, 0.55)
$panel_bg  = rgba(10, 12, 18, 0.72)
$panel_br  = rgba(51, 204, 255, 0.9)

general {
    hide_cursor = true
    ignore_empty_input = true
}

# BACKGROUND — mountain, heavily blurred + darkened
background {
    monitor =
    path = ~/.cache/current-wallpaper
    blur_passes = 4
    blur_size = 8
    contrast = 1.1
    brightness = 0.32
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# ── TOP-LEFT: system status ────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "<span foreground='##ff2a6d'>●</span> <span foreground='##e0e4eb'>SECURE</span>  <span foreground='##33ccff'>◆</span> <span foreground='##e0e4eb'>LOCKED</span>  <span foreground='##00ff99'>▲</span> <span foreground='##e0e4eb'>$(whoami)@</span><span foreground='##00ff99'>$(hostname)</span>"
    color = $white
    font_size = 14
    font_family = $font
    position = 40, -30
    halign = left
    valign = top
}

# ── TOP-RIGHT: uptime + kernel ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:30000] echo "<span foreground='##7a8290'>uptime</span> <span foreground='##33ccff'>$(uptime -p | sed 's/up //')</span>  <span foreground='##7a8290'>kernel</span> <span foreground='##00ff99'>$(uname -r)</span>"
    color = $white
    font_size = 14
    font_family = $font
    position = -40, -30
    halign = right
    valign = top
}

# ── CENTER: big clock ──────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $cyan
    font_size = 180
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
}

# seconds strip
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##7a8290'>::</span> <span foreground='##00ff99'>$(date +'%S')</span> <span foreground='##7a8290'>sec</span>"
    color = $green
    font_size = 20
    font_family = $font
    position = 0, -10
    halign = center
    valign = center
}

# date strip
label {
    monitor =
    text = cmd[update:60000] echo "<span foreground='##7a8290'>[</span> <span foreground='##00ff99'>$(date +'%Y.%m.%d')</span> <span foreground='##7a8290'>·</span> <span foreground='##33ccff'>$(date +'%A' | tr '[:lower:]' '[:upper:]')</span> <span foreground='##7a8290'>·</span> <span foreground='##ff2a6d'>W$(date +'%V')</span> <span foreground='##7a8290'>]</span>"
    color = $white
    font_size = 18
    font_family = $font
    position = 0, -60
    halign = center
    valign = center
}

# ── BOTTOM: AUTH panel ─────────────────────────────────────────────

# panel card
shape {
    monitor =
    size = 520, 200
    color = $panel_bg
    rounding = 12
    border_size = 2
    border_color = $panel_br
    rotate = 0
    xray = false
    position = 0, 135
    halign = center
    valign = bottom
}

# header label
label {
    monitor =
    text = <span foreground="##7a8290">[</span> <span foreground="##ff2a6d">AUTH REQUIRED</span> <span foreground="##7a8290">]</span>
    color = $magenta
    font_size = 13
    font_family = $font
    position = 0, 215
    halign = center
    valign = bottom
}

# fake shell prompt line
label {
    monitor =
    text = cmd[update:3600000] echo "<span foreground='##00ff99'>$(whoami)</span><span foreground='##7a8290'>@</span><span foreground='##33ccff'>$(hostname)</span><span foreground='##7a8290'>:</span><span foreground='##e0e4eb'>~</span><span foreground='##ff2a6d'>$</span> <span foreground='##7a8290'>sudo unlock --user $(whoami)</span>"
    color = $white
    font_size = 15
    font_family = $font
    position = 0, 180
    halign = center
    valign = bottom
}

# input field — gradient border matching Hyprland window borders
input-field {
    monitor =
    size = 480, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    inner_color = rgba(10, 12, 18, 0.85)
    font_color = $cyan
    fade_on_empty = false
    fade_timeout = 1000
    font_family = $font
    placeholder_text = <span foreground="##33ccffaa">&gt; passwd:</span>
    hide_input = false
    rounding = 8
    check_color = rgba(00ff99ee) rgba(33ccffee) 120deg
    fail_color = rgba(ff2a6dee) rgba(ff0066ee) 40deg
    fail_text = <span foreground="##ff2a6d">&gt; access denied · retry ($ATTEMPTS)</span>
    capslock_color = $magenta
    numlock_color = $cyan
    invert_numlock = false
    swap_font_color = false
    position = 0, 120
    halign = center
    valign = bottom
}

# hint line
label {
    monitor =
    text = <span foreground="##7a8290">press</span> <span foreground="##33ccff">ENTER</span> <span foreground="##7a8290">to authenticate · </span><span foreground="##ff2a6d">ESC</span> <span foreground="##7a8290">to cancel</span>
    color = $white_dim
    font_size = 12
    font_family = $font
    position = 0, 40
    halign = center
    valign = bottom
}
