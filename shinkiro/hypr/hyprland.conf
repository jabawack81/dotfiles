# Shinkiro (Desktop PC) specific Hyprland configuration

# Source the common configuration
source = ~/.config/hypr_common/common.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#         name, resolution,         position, scale
monitor = DP-2, 3840x2160@59.99700, 0x0,      1.50
monitor = DP-3, 3840x2160@59.99700, 2560x0,   1.50

####################
### WORKSPACES  ###
####################

# Odd workspaces on left monitor (DP-2), even on right (DP-3)
# Static rules for 1-10 (Super+key bindings); move-window-on-monitor.sh
# handles placement dynamically for workspaces beyond 10
workspace = 1, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 2, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 10, monitor:DP-3

#################
### AUTOSTART ###
#################

# Execute your favorite apps at launch
exec-once = systemctl --user start hyprpolkitagent
exec-once = ~/.config/waybar/waybar-launcher.sh & dunst & ~/.config/eww/eww-launcher.sh
exec-once = hypridle
exec-once = hyprsunset

#############################
### DESKTOP SPECIFIC VARS ###
#############################

# Additional environment variables for desktop
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

######################################
### DUAL-MONITOR WORKSPACE BINDS  ###
######################################

# Move window to next/prev workspace on the same monitor (Super+Ctrl+Shift+Arrow)
bind = $mainMod CTRL SHIFT, right, exec, ~/.config/hypr/move-window-on-monitor.sh next
bind = $mainMod CTRL SHIFT, left, exec, ~/.config/hypr/move-window-on-monitor.sh prev

############################
### MEDIA KEY BINDINGS  ###
############################

# Additional media key for Stop (not in common config)
bindl = , XF86AudioStop, exec, playerctl stop

# Note: Volume slider, mute, play/pause, prev, next are already configured in common.conf
# They use:
# - Volume up/down: pamixer for 5% increments
# - Mute: wpctl to toggle sink mute
# - Play/Pause/Prev/Next: playerctl for media control
exec-once = ~/bin/auto-memory-priority.sh
