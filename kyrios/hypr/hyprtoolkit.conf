# Hyprtoolkit theme - matches waybar/hyprland dark theme
# Used by hyprlauncher and other Hypr ecosystem tools

# Colors (format: 0xAARRGGBB)
background = 0xFF292b2e
base = 0xFF292b2e
text = 0xFFfdf6e3
alternate_base = 0xFF353839
bright_text = 0xFFffffff
accent = 0xFF268bd2
accent_secondary = 0xFF268bd2

# Typography
font_family = JetBrainsMono Nerd Font
font_family_monospace = JetBrainsMono Nerd Font
h1_size = 19
h2_size = 15
h3_size = 13
font_size = 12
small_font_size = 10

# Rounding (logical pixels)
rounding_large = 10
rounding_small = 5

# Icon theme
icon_theme = Adwaita
