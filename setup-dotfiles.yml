---
- name: Setup dotfiles based on hostname
  hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir }}"
    # Auto-detect target user - if run with sudo, use SUDO_USER, otherwise current user
    target_user: "{{ ansible_facts['env'].SUDO_USER | default(ansible_facts['env'].USER) }}"
    target_home: "{% if target_user == 'root' %}/root{% elif ansible_facts['os_family'] == 'Darwin' %}/Users/{{ target_user }}{% else %}/home/{{ target_user }}{% endif %}"
    home_dir: "{{ target_home }}"  # Added for compatibility
    config_dir: "{{ target_home }}/.config"
    oh_my_zsh_dir: "{{ target_home }}/.oh-my-zsh"
    hostname: "{{ ansible_facts['hostname'] }}"
    is_personal_machine: "{{ hostname in ['kyrios', 'shinkiro', 'lupus'] }}"
    is_omarchy_machine: "{{ hostname == 'lupus' }}"
    running_as_root: "{{ ansible_facts['user_id'] == 'root' }}"

    # Load private configuration if available
    private_config_file: "{{ dotfiles_dir }}/private-config/config.yml"

    # kyrios and shinkiro are personal Arch Linux machines
    # any other hostname is a work machine (currently macOS)

    # Configs allowed on work machines
    work_configs:
      - ghostty
      - nvim
      - btop
      - broot
      - lazygit
      - git
      - git-delta
      - rbenv
      - nodenv
      - fastfetch
      - opencode

    required_packages:
      # Core utilities
      - zsh
      - git
      - github-cli
      - neovim
      - lazygit
      - git-delta
      - jq
      - ripgrep
      - fd
      - fzf
      - bat
      - htop
      - btop
      - tmux
      - rsync
      - unzip
      - broot
      - zip
      - wget
      - wl-clipboard
      - cliphist
      - xdg-utils

      # Desktop environment
      - hyprland
      - hyprlock
      - waybar
      - dunst
      - grim
      - slurp
      - hyprpaper
      - hypridle
      - greetd
      - greetd-regreet
      - cage
      - playerctl
      - pamixer
      - brightnessctl
      - xdg-desktop-portal-hyprland
      - hyprpolkitagent
      - qt5-wayland
      - qt6-wayland

      # Audio
      - pipewire
      - pipewire-alsa
      - pipewire-jack
      - pipewire-pulse
      - pavucontrol

      # Fonts
      - powerline-fonts
      - ttf-jetbrains-mono-nerd
      - ttf-nerd-fonts-symbols
      - noto-fonts-emoji

      # Applications
      - ghostty
      - thunar
      - firefox
      - obsidian
      - telegram-desktop
      - steam

      # Hardware monitoring
      - nvtop
      - smartmontools

    aur_packages:
      - discord
      - slack-desktop
      - 1password
      - 1password-cli
      - wlogout
      - opencode-bin
      - eww
      - grimblast-git
      - hyprlauncher

    # Machine-specific packages
    shinkiro_packages:  # Desktop with AMD GPU
      - radeontop
      - corectrl
      - vulkan-radeon
      - xf86-video-amdgpu

    kyrios_packages:  # Laptop with Intel CPU/GPU
      - intel-ucode
      - intel-media-driver
      - libva-intel-driver
      - vulkan-intel
      - fprintd
      - libfprint
      - networkmanager
      - network-manager-applet
      - bluez
      - bluez-utils

    lupus_packages:  # ThinkPad T470p with NVIDIA 940MX (proprietary 580xx driver)
      - linux-firmware-nvidia
      - nvtop
      - nvidia-prime
      - dkms
      - hyprpwcenter            # native Hyprland PipeWire audio control center
      - hyprland-qt-support     # QT theming integration for Hyprland
      # nvidia-580xx-dkms and nvidia-580xx-utils installed via AUR (yay -S aur/nvidia-580xx-dkms)
      # nvidia-open does NOT support Maxwell (940MX) - must use 580xx branch

    lupus_aur_packages:  # ThinkPad T470p AUR packages
      - open-fprintd          # fingerprint daemon (works with python-validity)
      - fprintd-clients-git   # fprintd client tools (enroll, verify, list)
      - python-validity       # Validity/Synaptics fingerprint sensor driver
      - thinkfan-tui          # TUI for ThinkPad fan control

  tasks:
    # ── Bootstrap ──────────────────────────────────────────────
    - name: Check if private config exists
      stat:
        path: "{{ private_config_file }}"
      register: private_config_stat

    - name: Load private configuration
      include_vars: "{{ private_config_file }}"
      when: private_config_stat.stat.exists

    - name: Set private config loaded flag
      set_fact:
        private_config_loaded: "{{ private_config_stat.stat.exists | default(false) }}"

    - name: Display execution context
      debug:
        msg: |
          Running as: {{ ansible_facts['user_id'] }}
          Target user: {{ target_user }}
          Target home: {{ target_home }}
          Root execution: {{ running_as_root }}
          Private config loaded: {{ private_config_loaded }}

    - name: Create backup directory with timestamp
      set_fact:
        backup_dir: "{{ dotfiles_dir }}/backups/{{ ansible_facts['date_time'].epoch }}"

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"
        group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"

    - name: Display setup mode
      debug:
        msg: "Setting up {{ hostname }} as {{ 'PERSONAL MACHINE (Arch Linux - full configs)' if is_personal_machine else 'WORK MACHINE (macOS - limited configs)' }}"

    - name: Clean up broken symlinks in .config
      shell: |
        CONFIG_DIR="{{ config_dir }}"
        find "$CONFIG_DIR" -type l ! -exec test -e {} \; -print -delete
      register: cleaned_links
      changed_when: cleaned_links.stdout != ""
      become: no

    - name: Show cleaned broken links
      debug:
        msg: "Cleaned broken links: {{ cleaned_links.stdout_lines }}"
      when: cleaned_links.stdout != ""

    # ── Task includes ──────────────────────────────────────────
    - name: Install packages
      include_tasks: tasks/packages.yml

    - name: Setup shell (zsh, oh-my-zsh, .zshrc)
      include_tasks: tasks/shell.yml

    - name: Setup dotfile symlinks
      include_tasks: tasks/dotfiles.yml

    - name: Setup desktop environment
      include_tasks: tasks/desktop.yml
      when: is_personal_machine

    - name: Setup development tools
      include_tasks: tasks/devtools.yml

    - name: Setup Claude Code
      include_tasks: tasks/claude.yml

    # ── Cleanup ────────────────────────────────────────────────
    - name: Show backup summary
      block:
        - name: Check if any backups were created
          find:
            paths: "{{ backup_dir }}"
            file_type: any
          register: backup_contents

        - name: Display backup information
          debug:
            msg: |
              Backup Summary:
              ==============
              Backup directory: {{ backup_dir }}
              Files backed up: {{ backup_contents.files | length }}

              {% if backup_contents.files | length > 0 %}
              Backed up items:
              {% for item in backup_contents.files %}
              - {{ item.path | basename }}
              {% endfor %}

              Review these backups and delete the backup directory when satisfied.
              {% else %}
              No existing configs needed backing up.
              {% endif %}
          when: backup_contents is defined

    - name: Fix ownership of all config files
      block:
        - name: Ensure all config files are owned by target user
          file:
            path: "{{ config_dir }}"
            state: directory
            recurse: yes
            owner: "{{ target_user }}"
            group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
          when: running_as_root

        - name: Ensure home directory files are owned by target user
          file:
            path: "{{ item }}"
            owner: "{{ target_user }}"
            group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
          loop:
            - "{{ target_home }}/.zshrc"
            - "{{ target_home }}/.tmux.conf"
            - "{{ target_home }}/.gitconfig"
          when: running_as_root
          ignore_errors: yes

        - name: Fix oh-my-zsh ownership
          file:
            path: "{{ oh_my_zsh_dir }}"
            state: directory
            recurse: yes
            owner: "{{ target_user }}"
            group: "{{ 'staff' if ansible_facts['os_family'] == 'Darwin' else target_user }}"
          when:
            - running_as_root
            - oh_my_zsh_installed.stat.exists
