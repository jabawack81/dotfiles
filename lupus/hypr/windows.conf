# Custom window rules for lupus (ThinkPad T470p)
# Larger window for envy-tui GPU manager and thinkfan-tui

windowrule = float on, match:class org.omarchy.envy-tui
windowrule = center on, match:class org.omarchy.envy-tui
windowrule = size 1100 700, match:class org.omarchy.envy-tui

windowrule = float on, match:class org.omarchy.thinkfan-tui
windowrule = center on, match:class org.omarchy.thinkfan-tui
windowrule = size 1100 700, match:class org.omarchy.thinkfan-tui
