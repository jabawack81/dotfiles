# Shinkiro <-> lupus keybinding parity
#
# Tracked in dotfiles and sourced from ~/.config/hypr/hyprland.conf AFTER the
# Omarchy defaults, so these win on conflicts. The source line is wired up by
# the lupus task in tasks/desktop.yml.
#
# Rationale for each binding lives in docs/HYPRLAND_KEYBINDINGS_COMPARISON.md.

# Move active window to next/prev workspace on this monitor (Super + Ctrl + Shift + Left/Right)
bindd = SUPER CTRL SHIFT, RIGHT, Move window to next workspace, movetoworkspace, m+1
bindd = SUPER CTRL SHIFT, LEFT, Move window to prev workspace, movetoworkspace, m-1

# New empty workspace on current monitor (Super + N)
bindd = SUPER, N, New empty workspace, workspace, emptym

# Move window to scratchpad (Super + Shift + S);
# Omarchy's Super + Alt + S stays in place as a redundant secondary binding.
bindd = SUPER SHIFT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
